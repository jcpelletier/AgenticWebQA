name: agenticwebqa-testlogin

concurrency:
  group: agenticwebqa-testlogin
  cancel-in-progress: false

on:
  workflow_dispatch:
  schedule:
    - cron: "5 */6 * * *"
  push:
    branches: ["AgenticWebQA"]

jobs:
  testlogin:
    runs-on: windows-latest
    steps:
      - name: Set Playwright cache path
        shell: pwsh
        run: |
          "PLAYWRIGHT_BROWSERS_PATH=$env:RUNNER_TEMP\ms-playwright" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Ensure cache paths exist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .\Models | Out-Null
          New-Item -ItemType Directory -Force "$env:PLAYWRIGHT_BROWSERS_PATH" | Out-Null

      - name: Cache restore Playwright browsers
        id: playwright-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-v1
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\requirements.txt
          python -m playwright install chromium

      - name: Run formatting, type checks, and unit tests
        shell: pwsh
        run: |
          python -m ruff format .
          python -m mypy .
          python -m pytest -q tests

      - name: Reset learned artifacts
        shell: pwsh
        run: |
          if (Test-Path .\Models) { Remove-Item -Recurse -Force .\Models }
          if (Test-Path .\site_hints.json) { Remove-Item -Force .\site_hints.json }
          New-Item -ItemType Directory -Force .\Models | Out-Null

      - name: Reset agent_view (learn)
        shell: pwsh
        run: |
          if (Test-Path .\agent_view) { Remove-Item -Recurse -Force .\agent_view }
          New-Item -ItemType Directory -Force .\agent_view | Out-Null

      - name: Start local test site
        shell: pwsh
        run: |
          $siteDir = "$env:GITHUB_WORKSPACE\test-site"
          if (-not (Test-Path $siteDir)) { throw "Missing test site at $siteDir" }
          $proc = Start-Process -FilePath python -ArgumentList "-m","http.server","8000","--directory",$siteDir -WorkingDirectory $env:GITHUB_WORKSPACE -PassThru
          $proc.Id | Out-File -FilePath .\server.pid -Encoding ascii

      - name: Wait for local test site
        shell: pwsh
        run: |
          $url = "http://127.0.0.1:8000/index.html"
          for ($i = 0; $i -lt 45; $i++) {
            $tcp = Test-NetConnection -ComputerName 127.0.0.1 -Port 8000 -WarningAction SilentlyContinue
            if ($tcp.TcpTestSucceeded) { break }
            Start-Sleep -Seconds 1
          }
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $resp = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 3
              if ($resp.StatusCode -eq 200) { return }
            } catch { }
            Start-Sleep -Seconds 1
          }
          if (Test-Path .\server.pid) {
            $pid = Get-Content .\server.pid | Select-Object -First 1
            Write-Host "Server PID: $pid"
            Get-Process -Id $pid -ErrorAction SilentlyContinue | Format-List *
          }
          throw "Local test site not reachable at $url"

      - name: Run Login Flow (learn)
        shell: pwsh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -u .\vision_playwright_openai_vision_poc.py `
            --prompt "Log in with username 'demo' and password 'demo123'.`n1. Fill in the username field`n2. Fill in the password field`n3. Click Log in" `
            --visual-llm-success "You are on the Home page and see 'Welcome, demo'." `
            --start-url "http://127.0.0.1:8000/index.html" `
            --actions "login_flow" `
            --max-steps 20 `
            --headless `
            --verbose `
            --max-subactions-per-function 5 `
            --model "gemini-2.5-flash"

      - name: Break saved selectors (auto-heal prep)
        shell: pwsh
        run: |
          $changed = 0
          $files = Get-ChildItem -Path .\Models -Recurse -File -ErrorAction SilentlyContinue
          foreach ($f in $files) {
            $raw = Get-Content -Path $f.FullName -Raw
            if ($raw -match "data-testid") {
              $updated = $raw -replace "data-testid", "test-testid"
              if ($updated -ne $raw) {
                Set-Content -Path $f.FullName -Value $updated -Encoding utf8
                $changed++
              }
            }
          }
          if ($changed -le 0) {
            throw "No saved selectors were modified in .\Models (expected at least one data-testid replacement)."
          }
          Write-Host "Modified $changed file(s) in .\Models."

      - name: Reset agent_view (auto-heal)
        shell: pwsh
        run: |
          if (Test-Path .\agent_view) { Remove-Item -Recurse -Force .\agent_view }
          New-Item -ItemType Directory -Force .\agent_view | Out-Null

      - name: Run Login Flow (auto-heal)
        shell: pwsh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -u .\vision_playwright_openai_vision_poc.py `
            --prompt "Log in with username 'demo' and password 'demo123'.`n1. Fill in the username field`n2. Fill in the password field`n3. Click Log in" `
            --visual-llm-success "You are on the Home page and see 'Welcome, demo'." `
            --start-url "http://127.0.0.1:8000/index.html" `
            --actions "login_flow" `
            --max-steps 20 `
            --headless `
            --verbose `
            --max-subactions-per-function 5 `
            --model "gemini-2.5-flash" | Tee-Object -FilePath .\auto_heal_run.log

      - name: Reset agent_view (reuse)
        shell: pwsh
        run: |
          if (Test-Path .\agent_view) { Remove-Item -Recurse -Force .\agent_view }
          New-Item -ItemType Directory -Force .\agent_view | Out-Null

      - name: Run Login Flow (reuse)
        shell: pwsh
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -u .\vision_playwright_openai_vision_poc.py `
            --prompt "Log in with username 'demo' and password 'demo123'.`n1. Fill in the username field`n2. Fill in the password field`n3. Click Log in" `
            --visual-llm-success "You are on the Home page and see 'Welcome, demo'." `
            --start-url "http://127.0.0.1:8000/index.html" `
            --actions "login_flow" `
            --max-steps 20 `
            --headless `
            --verbose `
            --max-subactions-per-function 5 `
            --model "gemini-2.5-flash" | Tee-Object -FilePath .\reuse_run.log

      - name: Assert no vision fallback (reuse)
        shell: pwsh
        run: |
          $patterns = @(
            "\[playwright\] Falling back to LLM\.",
            "dom_fallback_error"
          )
          foreach ($p in $patterns) {
            if (Select-String -Path .\reuse_run.log -Pattern $p -Quiet) {
              Write-Error "Vision fallback detected in reuse run. Pattern: $p"
            }
          }

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent_screenshots
          path: |
            agent_view/**
            agent_view/*.png
          retention-days: 3
          if-no-files-found: warn

      - name: Cache save Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ steps.playwright-cache.outputs.cache-primary-key }}


