[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
check_untyped_defs = false
disallow_any_generics = false
no_implicit_optional = true
show_error_codes = true

[[tool.mypy.overrides]]
module = ["ttkbootstrap.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["playwright.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["PIL.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["azure.*"]
ignore_missing_imports = true

