<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page">
    <header class="topbar site-header" data-testid="site-header">
      <nav class="site-nav" aria-label="Main navigation">
        <a id="profile-home-link" data-testid="nav-home" href="home.html">Home</a>
        <span
          id="profile-root"
          class="active-label"
          data-testid="nav-profile"
          aria-current="page"
          >Profile</span
        >
      </nav>
    </header>
    <main class="card">
      <h1 data-testid="profile-title">Profile</h1>
      <p id="profile-username" data-testid="profile-username"></p>
      <label id="profile-about-label" data-testid="profile-about-label" for="profile-about-input"
        >About me</label
      >
      <textarea
        id="profile-about-input"
        data-testid="profile-about-input"
        name="profile-about-input"
        maxlength="1000"
        rows="6"
      ></textarea>
      <label
        id="profile-country-label"
        data-testid="profile-country-label"
        for="profile-country-select"
        >Country</label
      >
      <select
        id="profile-country-select"
        data-testid="profile-country-select"
        name="profile-country-select"
      ></select>
      <div id="profile-state-container" data-testid="profile-state-container" hidden>
        <label id="profile-state-label" data-testid="profile-state-label" for="profile-state-select"
          >State</label
        >
        <select
          id="profile-state-select"
          data-testid="profile-state-select"
          name="profile-state-select"
        ></select>
      </div>
      <label
        id="profile-displayname-label"
        data-testid="profile-displayname-label"
        for="profile-displayname-input"
        >Display name</label
      >
      <input
        id="profile-displayname-input"
        data-testid="profile-displayname-input"
        name="profile-displayname-input"
        type="text"
        maxlength="32"
      />
      <section id="profile-mydetails-section" data-testid="profile-mydetails-section">
        <h2 class="profile-section-heading" id="profile-mydetails-heading" data-testid="profile-mydetails-heading">My Details</h2>

        <label for="profile-birthday-input">Birthday</label>
        <input
          id="profile-birthday-input"
          data-testid="profile-birthday-input"
          name="profile-birthday-input"
          type="date"
        />

        <label for="profile-hometown-input">Hometown</label>
        <input
          id="profile-hometown-input"
          data-testid="profile-hometown-input"
          name="profile-hometown-input"
          type="text"
        />

        <label for="profile-address-input">Address</label>
        <textarea
          id="profile-address-input"
          data-testid="profile-address-input"
          name="profile-address-input"
          rows="3"
        ></textarea>

        <label for="profile-timezone-select">Timezone</label>
        <select
          id="profile-timezone-select"
          data-testid="profile-timezone-select"
          name="profile-timezone-select"
        ></select>

        <label for="profile-favoritecolor-input">Favorite Color</label>
        <input
          id="profile-favoritecolor-input"
          data-testid="profile-favoritecolor-input"
          name="profile-favoritecolor-input"
          type="text"
        />

        <label for="profile-occupation-input">Occupation</label>
        <input
          id="profile-occupation-input"
          data-testid="profile-occupation-input"
          name="profile-occupation-input"
          type="text"
        />

        <label for="profile-pronouns-input">Pronouns</label>
        <input
          id="profile-pronouns-input"
          data-testid="profile-pronouns-input"
          name="profile-pronouns-input"
          type="text"
        />

        <label for="profile-favoritequote-input">Favorite Quote</label>
        <textarea
          id="profile-favoritequote-input"
          data-testid="profile-favoritequote-input"
          name="profile-favoritequote-input"
          maxlength="500"
          rows="3"
        ></textarea>

        <section id="profile-sociallinks-section" data-testid="profile-sociallinks-section">
          <h3 class="profile-section-heading">Social Links</h3>

          <label for="profile-social-linkedin-input">LinkedIn</label>
          <div class="social-link-row">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-label="LinkedIn" data-testid="social-icon-linkedin" role="img"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            <input id="profile-social-linkedin-input" data-testid="profile-social-linkedin-input" name="profile-social-linkedin-input" type="text" placeholder="linkedin.com/in/username" />
          </div>

          <label for="profile-social-xtwitter-input">X / Twitter</label>
          <div class="social-link-row">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-label="X (Twitter)" data-testid="social-icon-xtwitter" role="img"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            <input id="profile-social-xtwitter-input" data-testid="profile-social-xtwitter-input" name="profile-social-xtwitter-input" type="text" placeholder="x.com/username" />
          </div>

          <label for="profile-social-instagram-input">Instagram</label>
          <div class="social-link-row">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-label="Instagram" data-testid="social-icon-instagram" role="img"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            <input id="profile-social-instagram-input" data-testid="profile-social-instagram-input" name="profile-social-instagram-input" type="text" placeholder="instagram.com/username" />
          </div>

          <label for="profile-social-facebook-input">Facebook</label>
          <div class="social-link-row">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-label="Facebook" data-testid="social-icon-facebook" role="img"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            <input id="profile-social-facebook-input" data-testid="profile-social-facebook-input" name="profile-social-facebook-input" type="text" placeholder="facebook.com/username" />
          </div>

          <label for="profile-social-github-input">GitHub</label>
          <div class="social-link-row">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-label="GitHub" data-testid="social-icon-github" role="img"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
            <input id="profile-social-github-input" data-testid="profile-social-github-input" name="profile-social-github-input" type="text" placeholder="github.com/username" />
          </div>
        </section>
      </section>

      <button id="profile-save-button" data-testid="profile-save-button" type="button">Save</button>
    </main>
    <script src="app.js"></script>
  </body>
</html>
